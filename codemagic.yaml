# Configuration de build cloud Codemagic — compile MonSport iOS sans Mac, depuis Windows.
# Doc : https://docs.codemagic.io/yaml-quick-start/building-a-capacitor-app/
workflows:
  ios-monsport:
    name: MonSport iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Nom de l'intégration App Store Connect que tu créeras dans Codemagic (Teams > Integrations)
      app_store_connect: MonSport ASC key
    environment:
      node: 22
      xcode: latest
    scripts:
      - name: Installer les dépendances
        script: npm ci || npm install
      - name: Préparer les assets web (dossier www)
        script: |
          mkdir -p www
          cp index.html app.js manifest.json icon.svg sw.js confidentialite.html www/
      - name: Synchroniser Capacitor iOS
        script: npx cap sync ios
      - name: Signature (création auto du certificat + profil App Store)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.yohan.monsport" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Compiler l'IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true   # envoie automatiquement sur TestFlight (test)
        # submit_to_app_store: false # passe à true quand tu veux soumettre à la review App Store
