# Configuration de build cloud Codemagic — compile MonSport iOS sans Mac, depuis Windows.
# Doc : https://docs.codemagic.io/yaml-quick-start/building-a-capacitor-app/
workflows:
  ios-monsport:
    name: MonSport iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: MonSport ASC key
    environment:
      groups:
        - signing          # contient CERTIFICATE_PRIVATE_KEY (clé privée fixe du certificat)
      node: 22
      xcode: latest
    scripts:
      - name: Installer les dépendances
        script: npm ci || npm install
      - name: Préparer les assets web (dossier www)
        script: |
          mkdir -p www
          cp index.html app.js manifest.json icon.svg sw.js confidentialite.html www/
      - name: Synchroniser Capacitor iOS
        script: npx cap sync ios
      - name: Numéro de build unique (incrémenté depuis App Store Connect)
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "6788514576" 2>/dev/null || echo 0)
          cd ios/App
          agvtool new-version -all $(($LATEST + 1))
      - name: Signature (clé privée fixe réutilisée + profil)
        script: |
          keychain initialize
          # Utilise la clé privée FIXE (env var CERTIFICATE_PRIVATE_KEY) : réutilise le même
          # certificat à chaque build (plus de 409 "already have a certificate", plus de limite).
          app-store-connect fetch-signing-files "com.yohan.monsport" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Compiler l'IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
