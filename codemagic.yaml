# Configuration de build cloud Codemagic — compile MonSport iOS sans Mac, depuis Windows.
# Doc : https://docs.codemagic.io/yaml-quick-start/building-a-capacitor-app/
workflows:
  ios-monsport:
    name: MonSport iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: MonSport ASC key
    environment:
      # Signature automatique managée par Codemagic (il génère + conserve la clé privée du certificat)
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.yohan.monsport
      node: 22
      xcode: latest
    scripts:
      - name: Installer les dépendances
        script: npm ci || npm install
      - name: Préparer les assets web (dossier www)
        script: |
          mkdir -p www
          cp index.html app.js manifest.json icon.svg sw.js confidentialite.html www/
      - name: Synchroniser Capacitor iOS
        script: npx cap sync ios
      - name: Appliquer les profils de signature
        script: xcode-project use-profiles
      - name: Compiler l'IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
